name: Build iOS prototype

on:
  push:
    branches: [ main ]
    
jobs:
  build-ios:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate --spec ios/project.yml

      - name: Build iPhoneOS app without signing
        run: |
          xcodebuild \
            -project ios/TgWsProxyIOS.xcodeproj \
            -scheme TgWsProxyIOS \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      - name: Verify built app extension metadata
        run: |
          APP_PATH="build/Build/Products/Release-iphoneos/TgWsProxyIOS.app"
          EXT_PATH="$APP_PATH/PlugIns/TgWsProxyTunnel.appex"

          test -d "$APP_PATH"
          test -d "$EXT_PATH"
          test -f "$EXT_PATH/Info.plist"

          /usr/bin/plutil -p "$EXT_PATH/Info.plist"
          /usr/bin/plutil -extract NSExtension xml1 -o - "$EXT_PATH/Info.plist"

      - name: Package IPA
        run: |
          rm -rf build/ipa
          mkdir -p build/ipa/Payload
          /usr/bin/ditto build/Build/Products/Release-iphoneos/TgWsProxyIOS.app build/ipa/Payload/TgWsProxyIOS.app
          cd build/ipa
          /usr/bin/ditto -c -k --sequesterRsrc --keepParent Payload TgWsProxyIOS-unsigned.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: TgWsProxyIOS-unsigned
          path: build/ipa/TgWsProxyIOS-unsigned.ipa
