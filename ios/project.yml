name: TgWsProxyIOS
options:
  bundleIdPrefix: org.flowseal
  deploymentTarget:
    iOS: '17.0'
settings:
  base:
    PRODUCT_NAME: TgWsProxyIOS
    SWIFT_VERSION: '5.10'
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.1.0
    TARGETED_DEVICE_FAMILY: '1,2'
    GENERATE_INFOPLIST_FILE: NO
    DEVELOPMENT_TEAM: ''
    CODE_SIGN_STYLE: Automatic
packages: {}
targets:
  TgWsProxyIOS:
    type: application
    platform: iOS
    deploymentTarget: '17.0'
    sources:
      - path: TgWsProxyIOS/App
      - path: TgWsProxyIOS/Shared
    resources:
      - path: TgWsProxyIOS/Resources
        excludes:
          - Info-Extension.plist
          - App.entitlements
          - Extension.entitlements
    info:
      path: TgWsProxyIOS/Resources/Info-App.plist
    entitlements:
      path: TgWsProxyIOS/Resources/App.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.flowseal.TgWsProxyIOS
        INFOPLIST_FILE: TgWsProxyIOS/Resources/Info-App.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: TgWsProxyIOS/Resources/App.entitlements
    dependencies:
      - target: TgWsProxyTunnel
        embed: true
  TgWsProxyTunnel:
    type: app-extension
    platform: iOS
    deploymentTarget: '17.0'
    sources:
      - path: TgWsProxyIOS/Extension
      - path: TgWsProxyIOS/Shared
    info:
      path: TgWsProxyIOS/Resources/Info-Extension.plist
    entitlements:
      path: TgWsProxyIOS/Resources/Extension.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.flowseal.TgWsProxyIOS.TgWsProxyTunnel
        INFOPLIST_FILE: TgWsProxyIOS/Resources/Info-Extension.plist
        CODE_SIGN_ENTITLEMENTS: TgWsProxyIOS/Resources/Extension.entitlements
schemes:
  TgWsProxyIOS:
    build:
      targets:
        TgWsProxyIOS: all
        TgWsProxyTunnel: all
    run:
      config: Debug
    archive:
      config: Release
